image: rocker/verse:4.5.0

pages:
  stage: deploy
  before_script:    
  # Install Quarto (not necessary, quarto should be included in rocker/verse)
#  - wget https://github.com/quarto-dev/quarto-cli/releases/download/v1.5.57/quarto-1.5.57-linux-amd64.deb
#  - sudo dpkg -i quarto-1.5.57-linux-amd64.deb
#  - quarto check install  # Ensure Quarto is installed properly
  
  # Install renv and restore project dependencies
  - R -e "install.packages('renv')"
  - R -e "renv::restore(confirm = FALSE)"

    
  script: 
  - cd contents
  - quarto render 
  - mkdir ../public/
  - cp -r ./_site/* ../public/  
 
  artifacts:    
    paths:
    - public    
   
  only:
  - main
  interruptible: true
